
<div id="erd" style="padding: 1rem 0"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});

const diagram = `erDiagram
  users ||--o{ bills : "member has"
  users ||--o{ transactions : "member pays"
  users ||--o{ audit_logs : "actor logs"
  bills ||--o{ transactions : "bill settled by"
  transactions ||--o{ documents : "receipt stored"
  notices ||--o{ documents : "attachment"
  expenses ||--o{ documents : "voucher"

  users {
    string uid PK
    string name
    string email
    string phone
    string flatNumber
    string role
    string status
    timestamp createdAt
  }

  bills {
    string id PK
    string memberId FK
    string flatNumber
    number month
    number year
    number maintenanceAmount
    number otherCharges
    number totalAmount
    number paidAmount
    string status
    timestamp generatedAt
    timestamp dueDate
  }

  transactions {
    string id PK
    string memberId FK
    string billId FK
    number amount
    string paymentMode
    string referenceNumber
    string receiptUrl
    string recordedBy FK
    timestamp paidAt
  }

  expenses {
    string id PK
    string category
    string description
    number amount
    string paymentMode
    string vendor
    string voucherDocId FK
    string recordedBy FK
    timestamp expenseDate
  }

  notices {
    string id PK
    string title
    string body
    string status
    string[] attachmentDocIds
    string postedBy FK
    timestamp createdAt
    timestamp publishedAt
  }

  documents {
    string id PK
    string fileName
    string fileType
    string storageUrl
    string linkedTo
    string linkedId FK
    string category
    string uploadedBy FK
    timestamp uploadedAt
  }

  audit_logs {
    string id PK
    string actorId FK
    string actorRole
    string action
    string targetCollection
    string targetId
    timestamp timestamp
  }
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
